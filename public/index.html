<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupportDesk — CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0b0e14;
      --surface: #13161f;
      --surface2: #1a1e2a;
      --border: #252a38;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --open: #22d3a0;
      --progress: #f59e0b;
      --closed: #64748b;
      --danger: #ef4444;
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --text-dim: #9ca3af;
      --high: #ef4444;
      --medium: #f59e0b;
      --low: #22d3a0;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ---- LAYOUT ---- */
    .app { display: flex; min-height: 100vh; }

    /* ---- SIDEBAR ---- */
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.3s ease;
    }
    .sidebar-logo {
      padding: 0 24px 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .sidebar-logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .sidebar-logo span {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: block;
      margin-top: 2px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 0;
      transition: all 0.18s;
      font-size: 14px;
      font-weight: 500;
      position: relative;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--accent); background: rgba(79,142,247,0.08); }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }
    .nav-icon { font-size: 16px; }
    .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
    }
    .sidebar-section {
      padding: 12px 24px 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 8px;
    }

    /* ---- MAIN CONTENT ---- */
    .main {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ---- TOP BAR ---- */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }
    .topbar-spacer { flex: 1; }
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 380px;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 16px 9px 38px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); color: var(--text); }
    .btn-danger {
      background: rgba(239,68,68,0.12);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.2);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.22); }
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
    }

    /* ---- PAGE CONTENT ---- */
    .page { padding: 28px 32px; flex: 1; display: none; }
    .page.active { display: block; }

    /* ---- STATS CARDS ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: #2e3347; }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .stat-card.total::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .stat-card.open::before { background: var(--open); }
    .stat-card.progress::before { background: var(--progress); }
    .stat-card.closed::before { background: var(--closed); }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
    }
    .stat-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ---- FILTERS ---- */
    .filters-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }
    .filter-btn:hover { color: var(--text); border-color: #3a4055; }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
    .filter-btn.open.active { background: var(--open); border-color: var(--open); }
    .filter-btn.progress.active { background: var(--progress); border-color: var(--progress); color: #111; }
    .filter-btn.closed.active { background: var(--closed); border-color: var(--closed); }
    .sort-select {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    .sort-select:focus { border-color: var(--accent); }

    /* ---- TICKET TABLE ---- */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .table-header-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
    }
    .table-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 10px;
      border-radius: 20px;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(79,142,247,0.04); }
    tbody td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }
    .ticket-id {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }
    .customer-name { font-weight: 600; }
    .customer-email { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .subject-text { max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
    .badge.Open { background: rgba(34,211,160,0.12); color: var(--open); }
    .badge.Open::before { background: var(--open); }
    .badge.In.Progress { background: rgba(245,158,11,0.12); color: var(--progress); }
    .badge.In.Progress::before { background: var(--progress); }
    .badge.Closed { background: rgba(100,116,139,0.12); color: var(--closed); }
    .badge.Closed::before { background: var(--closed); }
    .priority-badge {
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .priority-badge.High { background: rgba(239,68,68,0.12); color: var(--high); }
    .priority-badge.Medium { background: rgba(245,158,11,0.12); color: var(--medium); }
    .priority-badge.Low { background: rgba(34,211,160,0.12); color: var(--low); }
    .date-text { font-size: 12px; color: var(--text-muted); }
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    .empty-state .empty-sub { font-size: 12px; margin-top: 6px; }

    /* ---- MODAL ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }
    .modal-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.18s;
    }
    .modal-close:hover { color: var(--text); background: var(--border); }
    .modal-body { padding: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 7px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .required { color: var(--danger); }

    /* ---- TICKET DETAIL ---- */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }
    .detail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }
    .detail-card-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .detail-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .meta-item label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
      display: block;
      margin-bottom: 5px;
    }
    .meta-item span { font-size: 13px; font-weight: 500; }
    .description-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-dim);
    }

    /* ---- NOTES ---- */
    .note-item {
      border-left: 3px solid var(--accent);
      padding: 12px 14px;
      background: var(--surface2);
      border-radius: 0 8px 8px 0;
      margin-bottom: 10px;
      animation: noteIn 0.25s ease;
    }
    @keyframes noteIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .note-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .note-author { font-weight: 600; color: var(--accent); }
    .note-text { font-size: 13px; line-height: 1.6; }
    .note-form textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      margin-bottom: 10px;
      transition: border 0.2s;
    }
    .note-form textarea:focus { border-color: var(--accent); }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      transition: color 0.18s;
      background: none;
      border: none;
      font-family: inherit;
    }
    .back-btn:hover { color: var(--text); }
    .detail-title-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 16px;
    }
    .detail-subject {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
    }
    .detail-ticket-id {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 6px;
    }

    /* ---- STATUS UPDATE PANEL ---- */
    .update-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .update-panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .status-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .status-btn {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }
    .status-btn:hover { color: var(--text); }
    .status-btn.Open.sel { background: rgba(34,211,160,0.15); border-color: var(--open); color: var(--open); }
    .status-btn.In_Progress.sel { background: rgba(245,158,11,0.15); border-color: var(--progress); color: var(--progress); }
    .status-btn.Closed.sel { background: rgba(100,116,139,0.15); border-color: var(--closed); color: var(--closed); }

    /* ---- TOAST ---- */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow);
      animation: toastIn 0.3s ease;
      min-width: 260px;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .toast.success { border-color: rgba(34,211,160,0.3); }
    .toast.success::before { content: '✓'; color: var(--open); font-weight: 800; }
    .toast.error { border-color: rgba(239,68,68,0.3); }
    .toast.error::before { content: '✕'; color: var(--danger); font-weight: 800; }

    /* ---- LOADING ---- */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--text-muted);
      gap: 10px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .mobile-menu-btn { display: block; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
      .page { padding: 20px 16px; }
      .topbar { padding: 14px 16px; }
      .form-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      thead th:nth-child(4), tbody td:nth-child(4),
      thead th:nth-child(5), tbody td:nth-child(5) { display: none; }
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .sidebar-overlay.open { display: block; }
  </style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>SupportDesk</h1>
      <span>CRM System</span>
    </div>
    <div class="sidebar-section">Main</div>
    <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <span class="nav-icon">⚡</span> Dashboard
    </div>
    <div class="nav-item" data-page="tickets" onclick="navigate('tickets')">
      <span class="nav-icon">🎫</span> All Tickets
      <span class="nav-badge" id="open-badge">0</span>
    </div>
    <div class="sidebar-section">Actions</div>
    <div class="nav-item" onclick="openCreateModal()">
      <span class="nav-icon">＋</span> New Ticket
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <div class="main">
    <!-- TOP BAR -->
    <div class="topbar">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="page-title">Dashboard</span>
      <div class="search-wrap" id="search-wrap" style="display:none;">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search tickets…" oninput="handleSearch()" />
      </div>
      <div class="topbar-spacer"></div>
      <button class="btn btn-primary" onclick="openCreateModal()">＋ New Ticket</button>
    </div>

    <!-- DASHBOARD PAGE -->
    <div class="page active" id="page-dashboard">
      <div class="stats-grid">
        <div class="stat-card total">
          <div class="stat-label">Total Tickets</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-sub">All time</div>
        </div>
        <div class="stat-card open">
          <div class="stat-label">Open</div>
          <div class="stat-value" id="stat-open" style="color:var(--open)">—</div>
          <div class="stat-sub">Awaiting response</div>
        </div>
        <div class="stat-card progress">
          <div class="stat-label">In Progress</div>
          <div class="stat-value" id="stat-progress" style="color:var(--progress)">—</div>
          <div class="stat-sub">Being worked on</div>
        </div>
        <div class="stat-card closed">
          <div class="stat-label">Closed</div>
          <div class="stat-value" id="stat-closed" style="color:var(--closed)">—</div>
          <div class="stat-sub">Resolved</div>
        </div>
      </div>
      <div class="table-wrap">
        <div class="table-header">
          <span class="table-header-title">Recent Tickets</span>
          <span class="table-count" id="recent-count">0 tickets</span>
        </div>
        <div id="recent-tickets-body"></div>
      </div>
    </div>

    <!-- ALL TICKETS PAGE -->
    <div class="page" id="page-tickets">
      <div class="filters-row">
        <button class="filter-btn active" data-filter="All" onclick="setFilter(this,'All')">All</button>
        <button class="filter-btn open" data-filter="Open" onclick="setFilter(this,'Open')">🟢 Open</button>
        <button class="filter-btn progress" data-filter="In Progress" onclick="setFilter(this,'In Progress')">🟡 In Progress</button>
        <button class="filter-btn closed" data-filter="Closed" onclick="setFilter(this,'Closed')">⚫ Closed</button>
        <select class="sort-select" onchange="handleSort(this.value)">
          <option value="created_at-DESC">Newest First</option>
          <option value="created_at-ASC">Oldest First</option>
          <option value="updated_at-DESC">Recently Updated</option>
          <option value="customer_name-ASC">Name A–Z</option>
        </select>
      </div>
      <div class="table-wrap">
        <div class="table-header">
          <span class="table-header-title">Tickets</span>
          <span class="table-count" id="tickets-count">0 tickets</span>
        </div>
        <div id="tickets-table-body"></div>
      </div>
    </div>

    <!-- TICKET DETAIL PAGE -->
    <div class="page" id="page-detail">
      <button class="back-btn" onclick="navigate('tickets')">← Back to Tickets</button>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<!-- CREATE TICKET MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Create New Ticket</span>
      <button class="modal-close" onclick="closeCreateModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Customer Name <span class="required">*</span></label>
          <input type="text" id="f-name" placeholder="John Smith" />
        </div>
        <div class="form-group">
          <label>Customer Email <span class="required">*</span></label>
          <input type="email" id="f-email" placeholder="john@example.com" />
        </div>
      </div>
      <div class="form-group">
        <label>Subject <span class="required">*</span></label>
        <input type="text" id="f-subject" placeholder="Brief summary of the issue…" />
      </div>
      <div class="form-group">
        <label>Description <span class="required">*</span></label>
        <textarea id="f-desc" rows="4" placeholder="Describe the issue in detail…"></textarea>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="f-priority">
          <option value="Low">Low</option>
          <option value="Medium" selected>Medium</option>
          <option value="High">High</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitTicket()">Create Ticket</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

<script>
  const API = '/api';
  let currentFilter = 'All';
  let currentSearch = '';
  let currentSort = 'created_at';
  let currentOrder = 'DESC';
  let currentPage = 'dashboard';

  // ---- NAVIGATION ----
  function navigate(page, ticketId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    const navItem = document.querySelector(`[data-page="${page}"]`);
    if (navItem) navItem.classList.add('active');

    currentPage = page;
    const titleMap = { dashboard: 'Dashboard', tickets: 'All Tickets', detail: 'Ticket Detail' };
    document.getElementById('page-title').textContent = titleMap[page] || page;

    const searchWrap = document.getElementById('search-wrap');
    searchWrap.style.display = page === 'tickets' ? 'block' : 'none';

    if (page === 'dashboard') loadDashboard();
    if (page === 'tickets') loadTickets();
    if (page === 'detail' && ticketId) loadTicketDetail(ticketId);
    closeSidebar();
  }

  // ---- SIDEBAR MOBILE ----
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }

  // ---- LOAD DASHBOARD ----
  async function loadDashboard() {
    try {
      const [stats, tickets] = await Promise.all([
        fetch(`${API}/tickets/stats`).then(r => r.json()),
        fetch(`${API}/tickets`).then(r => r.json())
      ]);
      document.getElementById('stat-total').textContent = stats.total ?? 0;
      document.getElementById('stat-open').textContent = stats.open ?? 0;
      document.getElementById('stat-progress').textContent = stats.inProgress ?? 0;
      document.getElementById('stat-closed').textContent = stats.closed ?? 0;
      document.getElementById('open-badge').textContent = stats.open ?? 0;

      const recent = tickets.slice(0, 8);
      document.getElementById('recent-count').textContent = `${recent.length} recent`;
      document.getElementById('recent-tickets-body').innerHTML = renderTable(recent);
    } catch (e) {
      console.error(e);
    }
  }

  // ---- LOAD TICKETS ----
  async function loadTickets() {
    const body = document.getElementById('tickets-table-body');
    body.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
    try {
      const params = new URLSearchParams();
      if (currentFilter !== 'All') params.set('status', currentFilter);
      if (currentSearch) params.set('search', currentSearch);
      params.set('sort', currentSort);
      params.set('order', currentOrder);

      const tickets = await fetch(`${API}/tickets?${params}`).then(r => r.json());
      document.getElementById('tickets-count').textContent = `${tickets.length} ticket${tickets.length !== 1 ? 's' : ''}`;
      body.innerHTML = renderTable(tickets);
    } catch (e) {
      body.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load tickets.</p></div>';
    }
  }

  // ---- RENDER TABLE ----
  function renderTable(tickets) {
    if (!tickets.length) {
      return `<div class="empty-state">
        <div class="empty-icon">🎫</div>
        <p>No tickets found</p>
        <p class="empty-sub">Try adjusting your search or filters.</p>
      </div>`;
    }
    return `<table>
      <thead>
        <tr>
          <th>Ticket ID</th>
          <th>Customer</th>
          <th>Subject</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        ${tickets.map(t => `
          <tr onclick="navigate('detail','${t.ticket_id}')">
            <td><span class="ticket-id">${t.ticket_id}</span></td>
            <td>
              <div class="customer-name">${escHtml(t.customer_name)}</div>
              <div class="customer-email">${escHtml(t.customer_email)}</div>
            </td>
            <td><div class="subject-text">${escHtml(t.subject)}</div></td>
            <td><span class="priority-badge ${t.priority}">${t.priority}</span></td>
            <td><span class="badge ${escHtml(t.status)}">${t.status}</span></td>
            <td><span class="date-text">${formatDate(t.created_at)}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  }

  // ---- LOAD TICKET DETAIL ----
  async function loadTicketDetail(ticketId) {
    const container = document.getElementById('detail-content');
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
    try {
      const ticket = await fetch(`${API}/tickets/${ticketId}`).then(r => r.json());
      container.innerHTML = renderDetail(ticket);
    } catch (e) {
      container.innerHTML = '<p style="color:var(--danger)">Failed to load ticket.</p>';
    }
  }

  function renderDetail(ticket) {
    const notes = ticket.notes || [];
    return `
    <div class="detail-title-bar">
      <div>
        <div class="detail-ticket-id">${ticket.ticket_id}</div>
        <div class="detail-subject">${escHtml(ticket.subject)}</div>
      </div>
      <button class="btn btn-danger" onclick="deleteTicket('${ticket.ticket_id}')">🗑 Delete</button>
    </div>
    <div class="detail-grid">
      <div>
        <div class="detail-card">
          <div class="detail-card-title">Ticket Information</div>
          <div class="detail-meta">
            <div class="meta-item"><label>Customer</label><span>${escHtml(ticket.customer_name)}</span></div>
            <div class="meta-item"><label>Email</label><span>${escHtml(ticket.customer_email)}</span></div>
            <div class="meta-item"><label>Status</label><span class="badge ${ticket.status}">${ticket.status}</span></div>
            <div class="meta-item"><label>Priority</label><span class="priority-badge ${ticket.priority}">${ticket.priority}</span></div>
            <div class="meta-item"><label>Created</label><span>${formatDate(ticket.created_at)}</span></div>
            <div class="meta-item"><label>Last Updated</label><span>${formatDate(ticket.updated_at)}</span></div>
          </div>
        </div>
        <div class="detail-card">
          <div class="detail-card-title">Description</div>
          <div class="description-box">${escHtml(ticket.description)}</div>
        </div>
        <div class="detail-card">
          <div class="detail-card-title">Notes & Activity (${notes.length})</div>
          <div id="notes-list">
            ${notes.length ? notes.map(n => `
              <div class="note-item">
                <div class="note-meta">
                  <span class="note-author">👤 ${escHtml(n.author)}</span>
                  <span>${formatDate(n.created_at)}</span>
                </div>
                <div class="note-text">${escHtml(n.note_text)}</div>
              </div>`).join('') : '<p style="color:var(--text-muted);font-size:13px;margin-bottom:14px;">No notes yet.</p>'}
          </div>
          <div class="note-form">
            <textarea id="note-input" rows="3" placeholder="Add a note…"></textarea>
            <button class="btn btn-primary" onclick="addNote('${ticket.ticket_id}')">Add Note</button>
          </div>
        </div>
      </div>
      <div>
        <div class="update-panel">
          <div class="update-panel-title">Update Status</div>
          <div class="status-buttons">
            <button class="status-btn Open ${ticket.status === 'Open' ? 'sel' : ''}"
              onclick="updateStatus('${ticket.ticket_id}','Open',this)">🟢 Open</button>
            <button class="status-btn In_Progress ${ticket.status === 'In Progress' ? 'sel' : ''}"
              onclick="updateStatus('${ticket.ticket_id}','In Progress',this)">🟡 In Progress</button>
            <button class="status-btn Closed ${ticket.status === 'Closed' ? 'sel' : ''}"
              onclick="updateStatus('${ticket.ticket_id}','Closed',this)">⚫ Closed</button>
          </div>
          <div class="update-panel-title" style="margin-top:16px">Update Priority</div>
          <div class="status-buttons">
            <button class="status-btn ${ticket.priority === 'Low' ? 'Open sel' : ''}"
              onclick="updatePriority('${ticket.ticket_id}','Low',this)">🟢 Low</button>
            <button class="status-btn ${ticket.priority === 'Medium' ? 'In_Progress sel' : ''}"
              onclick="updatePriority('${ticket.ticket_id}','Medium',this)">🟡 Medium</button>
            <button class="status-btn ${ticket.priority === 'High' ? 'Closed sel' : ''}"
              onclick="updatePriority('${ticket.ticket_id}','High',this)">🔴 High</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  // ---- FILTERS & SEARCH ----
  function setFilter(btn, filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTickets();
  }

  function handleSearch() {
    currentSearch = document.getElementById('search-input').value;
    clearTimeout(handleSearch._t);
    handleSearch._t = setTimeout(loadTickets, 280);
  }

  function handleSort(value) {
    const [sort, order] = value.split('-');
    currentSort = sort;
    currentOrder = order;
    loadTickets();
  }

  // ---- CREATE TICKET ----
  function openCreateModal() {
    document.getElementById('create-modal').classList.add('open');
    document.getElementById('f-name').focus();
  }
  function closeCreateModal() {
    document.getElementById('create-modal').classList.remove('open');
    ['f-name','f-email','f-subject','f-desc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-priority').value = 'Medium';
  }

  async function submitTicket() {
    const name = document.getElementById('f-name').value.trim();
    const email = document.getElementById('f-email').value.trim();
    const subject = document.getElementById('f-subject').value.trim();
    const desc = document.getElementById('f-desc').value.trim();
    const priority = document.getElementById('f-priority').value;

    if (!name || !email || !subject || !desc) {
      showToast('All fields are required.', 'error');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showToast('Please enter a valid email.', 'error');
      return;
    }

    try {
      const res = await fetch(`${API}/tickets`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ customer_name: name, customer_email: email, subject, description: desc, priority })
      });
      const data = await res.json();
      if (res.ok) {
        closeCreateModal();
        showToast(`Ticket ${data.ticket_id} created!`, 'success');
        if (currentPage === 'dashboard') loadDashboard();
        else if (currentPage === 'tickets') loadTickets();
      } else {
        showToast(data.error || 'Failed to create ticket.', 'error');
      }
    } catch (e) {
      showToast('Network error.', 'error');
    }
  }

  // ---- UPDATE STATUS ----
  async function updateStatus(ticketId, status, btn) {
    try {
      const res = await fetch(`${API}/tickets/${ticketId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (res.ok) {
        document.querySelectorAll('.status-btn').forEach(b => {
          if (['Open sel','In_Progress sel','Closed sel'].some(c => b.classList.contains(c.split(' ')[0]))) {
            b.classList.remove('sel');
          }
        });
        btn.classList.add('sel');
        showToast(`Status updated to "${status}"`, 'success');
        const statusBadge = document.querySelector('.badge');
        if (statusBadge) { statusBadge.className = `badge ${status}`; statusBadge.textContent = status; }
      }
    } catch(e) { showToast('Failed to update.', 'error'); }
  }

  async function updatePriority(ticketId, priority, btn) {
    try {
      const res = await fetch(`${API}/tickets/${ticketId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ priority })
      });
      if (res.ok) { showToast(`Priority set to "${priority}"`, 'success'); }
    } catch(e) { showToast('Failed to update.', 'error'); }
  }

  // ---- ADD NOTE ----
  async function addNote(ticketId) {
    const input = document.getElementById('note-input');
    const note = input.value.trim();
    if (!note) { showToast('Note cannot be empty.', 'error'); return; }
    try {
      const res = await fetch(`${API}/tickets/${ticketId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note })
      });
      if (res.ok) {
        input.value = '';
        showToast('Note added!', 'success');
        loadTicketDetail(ticketId);
      }
    } catch(e) { showToast('Failed to add note.', 'error'); }
  }

  // ---- DELETE TICKET ----
  async function deleteTicket(ticketId) {
    if (!confirm(`Delete ticket ${ticketId}? This cannot be undone.`)) return;
    try {
      const res = await fetch(`${API}/tickets/${ticketId}`, { method: 'DELETE' });
      if (res.ok) {
        showToast(`Ticket ${ticketId} deleted.`, 'success');
        navigate('tickets');
      }
    } catch(e) { showToast('Failed to delete.', 'error'); }
  }

  // ---- TOAST ----
  function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  // ---- HELPERS ----
  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) +
           ' ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  }

  // ---- KEYBOARD ----
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeCreateModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      navigate('tickets');
      setTimeout(() => document.getElementById('search-input')?.focus(), 50);
    }
  });
  document.getElementById('create-modal').addEventListener('click', function(e) {
    if (e.target === this) closeCreateModal();
  });

  // ---- SEED DEMO DATA ----
  async function seedDemoData() {
    const stats = await fetch(`${API}/tickets/stats`).then(r => r.json());
    if (stats.total > 0) return;
    const demos = [
      { customer_name:'Priya Sharma', customer_email:'priya@techcorp.in', subject:'Login issue on mobile app', description:'Cannot log in to the mobile app after the last update. It shows an error "Invalid token".', priority:'High' },
      { customer_name:'Rahul Verma', customer_email:'rahul.v@startup.io', subject:'Payment not processed', description:'Made a payment but money was deducted from account. Order shows as pending.', priority:'High' },
      { customer_name:'Anjali Singh', customer_email:'anjali@gmail.com', subject:'Export feature not working', description:'Tried to export report as CSV but the download does not start. Firefox browser.', priority:'Medium' },
      { customer_name:'Mohammed Ali', customer_email:'mali@enterprise.com', subject:'Feature request: Dark mode', description:'Would love a dark mode option in the dashboard. It would help during night usage.', priority:'Low' },
    ];
    for (const d of demos) {
      await fetch(`${API}/tickets`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) });
    }
    // Update one to In Progress and one to Closed for demo
    const all = await fetch(`${API}/tickets`).then(r=>r.json());
    if (all[1]) await fetch(`${API}/tickets/${all[1].ticket_id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'In Progress'}) });
    if (all[2]) await fetch(`${API}/tickets/${all[2].ticket_id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'Closed', note:'Issue resolved after cache clear.'}) });
  }

  // ---- INIT ----
  (async () => {
    await seedDemoData();
    loadDashboard();
  })();
</script>
</body>
</html>
